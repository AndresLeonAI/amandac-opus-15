<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amanda Cruz - Asesoría Financiera Premium</title>
    <meta name="description" content="Asesoría financiera exclusiva con Amanda Cruz. Estrategias de inversión personalizadas para clientes selectos." />
    <meta name="author" content="Amanda Cruz" />
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-page: linear-gradient(135deg,
          hsl(220 45% 15%) 0%,
          hsl(225 50% 18%) 50%,
          hsl(230 55% 22%) 100%);
      }
      
      body, html {
        margin: 0;
        padding: 0;
        background-color: #0a0a2a; /* Dark blue background */
        overflow-x: hidden;
      }
      
      canvas#neuro {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: .95;
        z-index: -1; /* Ensures it stays in the background */
      }
    </style>

    <meta property="og:title" content="amandac-opus" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <!-- Neural Noise Background Canvas -->
    <canvas id="neuro"></canvas>
    
    <!-- Vertex Shader -->
    <script type="x-shader/x-fragment" id="vertShader">
        precision mediump float;
        varying vec2 vUv;
        attribute vec2 a_position;
        void main() {
            vUv = .5 * (a_position + 1.);
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    </script>

    <!-- Fragment Shader: Optimized for performance -->
    <script type="x-shader/x-fragment" id="fragShader">
        precision mediump float;
        varying vec2 vUv;
        uniform float u_time;
        uniform float u_ratio;
        uniform vec2 u_pointer_position;
        uniform float u_scroll_progress;

        vec2 rotate(vec2 uv, float th) {
            return mat2(cos(th), sin(th), -sin(th), cos(th)) * uv;
        }

        float neuro_shape(vec2 uv, float t, float p) {
            vec2 sine_acc = vec2(0.);
            vec2 res = vec2(0.);
            float scale = 8.;
            for (int j = 0; j < 10; j++) {
                uv = rotate(uv, 1.);
                sine_acc = rotate(sine_acc, 1.);
                vec2 layer = uv * scale + float(j) + sine_acc - t;
                sine_acc += sin(layer) + 2.4 * p;
                res += (.5 + .5 * cos(layer)) / scale;
                scale *= (1.25);
            }
            return res.x + res.y;
        }

        void main() {
            vec2 uv = .5 * vUv;
            uv.x *= u_ratio;
            vec2 pointer = vUv - u_pointer_position;
            pointer.x *= u_ratio;
            float p = clamp(length(pointer), 0., 1.);
            p = .5 * pow(1. - p, 2.);
            float t = .001 * u_time;
            vec3 color = vec3(0.);
            float noise = neuro_shape(uv, t, p);

            noise = 1.2 * pow(noise, 3.);
            noise += pow(noise, 9.);
            noise = max(.0, noise - 0.4);
            noise *= (1. - length(vUv - .5));

            color = vec3(1.0, 1.0, 1.0) * noise;

            gl_FragColor = vec4(color, noise);
        }
    </script>

    <div id="root" style="position: relative; z-index: 1;"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Neural Noise JavaScript -->
    <script>
        const canvasEl = document.querySelector("canvas#neuro");
        const devicePixelRatio = Math.min(window.devicePixelRatio, 2);
        const pointer = {
            x: 0,
            y: 0,
            tX: 0,
            tY: 0,
        };
        let uniforms;
        let isAnimationPaused = false;

        // Check for reduced motion preference
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        const gl = initShader();
        if (gl) {
            setupEvents();
            resizeCanvas();
            window.addEventListener("resize", resizeCanvas);
            if (!prefersReducedMotion) {
                render();
            }
        }

        function initShader() {
            const vsSource = document.getElementById("vertShader").innerHTML;
            const fsSource = document.getElementById("fragShader").innerHTML;
            const gl = canvasEl.getContext("webgl", { antialias: false, powerPreference: "high-performance" }) || canvasEl.getContext("experimental-webgl");

            if (!gl) {
                console.error("WebGL is not supported by your browser.");
                return null;
            }

            function createShader(gl, sourceCode, type) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, sourceCode);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error("An error occurred compiling the shaders: " + gl.getShaderInfoLog(shader));
                    gl.deleteShader(shader);
                    return null;
                }
                return shader;
            }

            const vertexShader = createShader(gl, vsSource, gl.VERTEX_SHADER);
            const fragmentShader = createShader(gl, fsSource, gl.FRAGMENT_SHADER);

            function createShaderProgram(gl, vertexShader, fragmentShader) {
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error("Unable to initialize the shader program: " + gl.getProgramInfoLog(program));
                    return null;
                }
                return program;
            }

            const shaderProgram = createShaderProgram(gl, vertexShader, fragmentShader);
            if (!shaderProgram) return null;
            
            uniforms = getUniforms(shaderProgram);

            function getUniforms(program) {
                let uniforms = {};
                let uniformCount = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
                for (let i = 0; i < uniformCount; i++) {
                    let uniformName = gl.getActiveUniform(program, i).name;
                    uniforms[uniformName] = gl.getUniformLocation(program, uniformName);
                }
                return uniforms;
            }

            const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
            const vertexBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
            gl.useProgram(shaderProgram);

            const positionLocation = gl.getAttribLocation(shaderProgram, "a_position");
            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            return gl;
        }

        function render() {
            if (prefersReducedMotion || isAnimationPaused) return;
            
            const currentTime = performance.now();
            pointer.x += (pointer.tX - pointer.x) * 0.2;
            pointer.y += (pointer.tY - pointer.y) * 0.2;

            gl.uniform1f(uniforms.u_time, currentTime);
            gl.uniform2f(uniforms.u_pointer_position, pointer.x / window.innerWidth, 1 - pointer.y / window.innerHeight);
            gl.uniform1f(uniforms.u_scroll_progress, window.pageYOffset / (2 * window.innerHeight));
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        function resizeCanvas() {
            canvasEl.width = window.innerWidth * devicePixelRatio;
            canvasEl.height = window.innerHeight * devicePixelRatio;
            gl.uniform1f(uniforms.u_ratio, canvasEl.width / canvasEl.height);
            gl.viewport(0, 0, canvasEl.width, canvasEl.height);
        }

        function setupEvents() {
            const updateMousePosition = (eX, eY) => {
                pointer.tX = eX;
                pointer.tY = eY;
            };

            window.addEventListener("pointermove", e => {
                updateMousePosition(e.clientX, e.clientY);
            });
            window.addEventListener("touchmove", e => {
                if (e.targetTouches[0]) {
                   updateMousePosition(e.targetTouches[0].clientX, e.targetTouches[0].clientY);
                }
            });
            
            // Pause animation when tab is not visible
            document.addEventListener('visibilitychange', () => {
                isAnimationPaused = document.hidden;
                if (!isAnimationPaused && !prefersReducedMotion) {
                    render();
                }
            });
        }
    </script>
  </body>
</html>
